name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: ./scripts/bootstrap.sh
      - run: docker compose config

  screen-preview:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: hardware/screen-agent/requirements-preview.txt
      - run: pip install -r hardware/screen-agent/requirements-preview.txt
      - run: python hardware/screen-agent/screen_agent.py --once --fixture hardware/screen-agent/fixture.json --output /tmp/nodi-screen.png
      - run: python -c "from PIL import Image; assert Image.open('/tmp/nodi-screen.png').size == (320, 240)"
